# stashPad Deployment(design.md §10)。
# deploy/docker-compose.yml と同じ実行時設定(env・read-only メディアマウント・
# 非 root 実行)を k8s 向けに移した単純構成。プレースホルダの一覧は
# deploy/k8s/README.md を参照。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stashpad
  labels:
    app: stashpad
spec:
  replicas: 1 # SQLite (ファイルベース DB) を使うため単一レプリカ固定。増やすと DB を壊す
  strategy:
    # 単一レプリカ + RWO PVC + SQLite の組み合わせでは、RollingUpdate だと
    # 新旧 Pod が入れ替わる一瞬の間、同じ PVC 上の SQLite ファイルに
    # 2つの Pod が同時にアクセスしてしまい破損の恐れがある。
    # 旧 Pod を完全に終了してから新 Pod を起動する Recreate を必須にする。
    type: Recreate
  selector:
    matchLabels:
      app: stashpad
  template:
    metadata:
      labels:
        app: stashpad
    spec:
      # PVC (/data) への書き込みを uid 65532 (distroless:nonroot) に許可するため
      # Pod レベルで fsGroup を設定する。対応する CSI ドライバであれば
      # ボリュームマウント時に自動で chown/chgrp してくれるため、
      # 手動での権限調整(compose での chown 65532:65532 data 相当)は不要になる。
      securityContext:
        runAsNonRoot: true
        fsGroup: 65532
      # graceful shutdown は最大 10 秒(backend/cmd/stashpad/main.go)。
      # そこに余裕を足して 15 秒とする。compose の stop_grace_period と揃える。
      terminationGracePeriodSeconds: 15
      containers:
        - name: stashpad
          image: REPLACE_ME/stashpad:latest # プレースホルダ。README.md 参照
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            # ライブラリルートは volumeMounts (media-voice 等) と対応させて増減させる。
            - name: STASHPAD_LIBRARY_ROOTS
              value: "/media/voice,/media/comic"
            - name: STASHPAD_DATA_DIR
              value: "/data"
            - name: STASHPAD_SCAN_ON_START
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: media-voice
              mountPath: /media/voice
              readOnly: true
            - name: media-comic
              mountPath: /media/comic
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            # アプリの書き込み先は STASHPAD_DATA_DIR (/data) 配下のみ
            # (サムネイルは main.go で filepath.Join(DataDir, "thumbs"))なので
            # ルートファイルシステムは read-only にできる。
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # startupProbe は用意しない: STASHPAD_SCAN_ON_START による起動時スキャンは
          # goroutine でバックグラウンド実行され、HTTP サーバは即座に Listen を
          # 開始する(main.go: go svc.RunStartupScan() の直後に router 構築・Listen)。
          # そのためスキャンの長さが起動判定をブロックすることはない。
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: stashpad-data
        # メディアは read-only マウント。NFS の例(server/path はプレースホルダ):
        - name: media-voice
          nfs:
            server: nfs.example.internal # プレースホルダ。README.md 参照
            path: /export/voice
            readOnly: true
        - name: media-comic
          nfs:
            server: nfs.example.internal
            path: /export/comic
            readOnly: true
        # NFS が無い場合(単一ノード等)の代替として hostPath も使える。上の
        # media-voice / media-comic を以下のように置き換える:
        # - name: media-voice
        #   hostPath:
        #     path: /mnt/fileserver/voice
        #     type: Directory
