# stashPad — 開発・お試し用 compose(design.md §10)
# メディアのマウント元パスは環境に合わせて変更すること。
services:
  stashpad:
    build:
      context: ..
    image: stashpad:latest
    ports:
      - "8080:8080"
    # イメージは distroless:nonroot(uid/gid 65532)で実行される。
    # ./data はこの uid が書き込める権限にしておくこと(例: chown 65532:65532 data)。
    # ホスト側で chown できない場合は user: を明示してもよい(コメントアウトを外して使用):
    # user: "65532:65532"
    volumes:
      - /mnt/fileserver/voice:/media/voice:ro # ライブラリルートは複数指定可
      - /mnt/fileserver/comic:/media/comic:ro
      - ./data:/data # SQLite + サムネイルキャッシュ
    environment:
      STASHPAD_LIBRARY_ROOTS: /media/voice,/media/comic
      STASHPAD_DATA_DIR: /data
      STASHPAD_SCAN_ON_START: "true"
    restart: unless-stopped
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD", "/stashpad", "-healthcheck"]
      interval: 30s
      timeout: 3s
      start_period: 10s
